<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayLocal</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header>
    <a class="logo" href="#" onclick="fechar(); return false;">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zm11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
        </div>
        <span class="logo-text">Play<span>Local</span></span>
    </a>

    <div class="search-wrap">
        <input type="text" id="busca" placeholder="Buscar no YouTube para baixar..." autocomplete="off">
        <button class="search-btn" onclick="buscarYT()">
            <svg viewBox="0 0 24 24"><path d="M20.87 20.17l-5.59-5.59C16.35 13.35 17 11.75 17 10c0-3.87-3.13-7-7-7s-7 3.13-7 7 3.13 7 7 7c1.75 0 3.35-.65 4.58-1.71l5.59 5.59.7-.71zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
        </button>
    </div>

    <button class="hdr-btn" onclick="carregar()" title="Atualizar vídeos">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        <span>Atualizar</span>
    </button>

    <button class="hdr-btn danger" onclick="excluirTudo()" title="Excluir todos os vídeos">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        <span>Excluir tudo</span>
    </button>

    <div class="storage-bar">
        <div class="storage-track">
            <div class="storage-fill" id="storage-fill" style="width:0%"></div>
        </div>
        <span class="storage-label" id="storage-label">– / 5 GB</span>
    </div>
</header>


<!-- ── GRADE PRINCIPAL ── -->
<div class="container">
    <div class="meta-row">
        <span class="video-count" id="count"></span>
    </div>
    <div class="grid" id="grid"></div>
</div>


<!-- ── MODAL DE BUSCA ── -->
<div class="search-modal" id="search-modal">
    <div class="search-box">
        <div class="search-box-header">
            <span class="search-box-title" id="search-box-title">Resultados do YouTube</span>
            <button class="search-close" onclick="fecharBusca()">×</button>
        </div>
        <div class="search-loading" id="search-loading">
            <div class="spinner"></div>
            Buscando no YouTube...
        </div>
        <div class="search-results" id="search-results"></div>
    </div>
</div>



<!-- ── DOWNLOAD PANEL ── -->
<div class="dl-panel" id="dl-panel" data-was-active="false">
    <div class="dl-panel-header">
        <div class="spinner-small"></div>
        <span class="dl-panel-title">Baixando vídeo...</span>
        <span class="dl-panel-fila" id="dl-fila"></span>
    </div>
    <div class="dl-panel-body">
        <div class="dl-thumb-row">
            <div class="dl-thumb">
                <img id="dl-thumb-img" src="" alt="" onerror="this.style.display='none'">
            </div>
            <div class="dl-video-title" id="dl-title"></div>
        </div>
        <div class="dl-progress-track">
            <div class="dl-progress-fill" id="dl-fill" style="width:0%"></div>
        </div>
        <div class="dl-meta">
            <span id="dl-speed">–</span>
            <span><span id="dl-pct-text">0%</span> · ETA <span id="dl-eta">–</span></span>
        </div>
    </div>
</div>

<!-- ── TOAST ── -->
<div class="queue-toast" id="toast"></div>


<!-- ── PLAYER ── -->
<div id="tela-player">
    <div class="ph">
        <button class="back-btn" onclick="fechar()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H20c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
            Voltar
        </button>
        <span class="ph-logo">Play<span>Local</span></span>
    </div>

    <div class="pb">
        <div class="pc">
            <div class="video-box">
                <video id="player" controls autoplay></video>
            </div>
            <div class="p-title" id="p-title"></div>
            <div class="p-sub"   id="p-sub"></div>
        </div>

        <div class="pl">
            <div class="pl-header">A seguir</div>
            <div class="pl-scroll" id="pl-scroll"></div>
        </div>
    </div>
</div>


<script src="/static/js/app.js"></script>
</body>
</html>
